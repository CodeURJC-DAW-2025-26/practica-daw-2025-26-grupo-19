      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
        status:
          type: string
        maxParticipants:
          type: integer
          format: int32
        hasImage:
          type: boolean
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamBasicDTO"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/MatchBasicDTO"
    PlayerBasicDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        position:
          type: string
        jerseyNumber:
          type: integer
          format: int32
        goals:
          type: integer
          format: int32
        assists:
          type: integer
          format: int32
        hasImage:
          type: boolean
    TeamDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        teamName:
          type: string
        hasImage:
          type: boolean
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerBasicDTO"
        tournaments:
          type: array
          items:
            $ref: "#/components/schemas/TournamentBasicDTO"
    PlayerDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        position:
          type: string
        jerseyNumber:
          type: integer
          format: int32
        goals:
          type: integer
          format: int32
        assists:
          type: integer
          format: int32
        hasImage:
          type: boolean
        team:
          $ref: "#/components/schemas/TeamBasicDTO"
    MatchDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        formattedDate:
          type: string
        homeGoals:
          type: integer
          format: int32
        awayGoals:
          type: integer
          format: int32
        played:
          type: boolean
        tournament:

        homeTeam:
          $ref: "#/components/schemas/TeamBasicDTO"
        awayTeam:
          $ref: "#/components/schemas/TeamBasicDTO"
    RegisterDTO:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        teamName:
          type: string
    MatchRequestDTO:
      type: object
      properties:
        formattedDate:
          type: string
        homeGoals:
          type: integer
          format: int32
        awayGoals:
          type: integer
          format: int32
        played:
          type: boolean
        tournamentId:
          type: integer
          format: int64
        homeTeamId:
          type: integer
          format: int64
        awayTeamId:
          type: integer
          format: int64
    ForgotPasswordRequestDTO:
      type: object
      properties:
        email:
          type: string
    MessageResponseDTO:
      type: object
      properties:
        message:
          type: string
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
        error:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageTournamentBasicDTO:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:

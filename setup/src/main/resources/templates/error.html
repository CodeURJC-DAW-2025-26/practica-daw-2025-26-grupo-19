{{> header}}

<main class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 py-5">
                <div class="card-body">
                    <div class="display-1 mb-4">
                        ⚠️
                    </div>
                    
                    <h1 class="display-4 fw-bold text-danger">Error {{status}}</h1>
                    
                    <h3 class="h4 text-muted mb-4">{{error}}</h3>
                    
                    <p class="lead mb-5">
                        ¡Vaya! Parece que el árbitro ha pitado fuera de juego. La página que buscas no existe o ha ocurrido un problema inesperado.
                    </p>
                    
                    <a href="/" class="btn btn-primary btn-lg fw-bold px-5 rounded-pill shadow-sm">
                        ⚽ Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

{{> footer}}
